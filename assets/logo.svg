<svg width="760" height="200" viewBox="0 0 760 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Paranoid Tools">
  <style>
    .mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  </style>
  <!-- self-contained dark card: renders identically on light and dark GitHub themes -->
  <rect x="1" y="1" width="758" height="198" rx="24" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>

  <!-- terminal tile -->
  <rect x="44" y="50" width="100" height="100" rx="20" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <!-- green prompt >_ -->
  <text x="66" y="118" class="mono" font-size="46" font-weight="700" fill="#22C55E">&gt;_</text>
  <!-- small padlock badge, top-right of the tile -->
  <g stroke="#22C55E" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M120 70 v-6 a8 8 0 0 1 16 0 v6"/>
  </g>
  <rect x="116" y="70" width="24" height="18" rx="4" fill="#22C55E"/>
  <circle cx="128" cy="78" r="2.6" fill="#0F172A"/>

  <!-- wordmark -->
  <text x="184" y="103" class="mono" font-size="56" font-weight="700" letter-spacing="1" fill="#F8FAFC">PARANOID</text>
  <text x="184" y="156" class="mono" font-size="34" font-weight="500" letter-spacing="2" fill="#22C55E">TOOLS</text>
  <!-- tagline -->
  <text x="324" y="156" class="mono" font-size="17" fill="#94A3B8">honest privacy · one job each</text>
</svg>
